<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Task Balls Physics Demo</title>
  <style>
    :root {
      color-scheme: light;
      --phone-w: min(390px, 100vw);
      --phone-h: min(844px, 100dvh);
      --ink: #18191b;
      --muted: #757981;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(28, 31, 36, 0.12);
      --drop-top: 112px;
      --drop-size: 210px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: #eef0f3;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .phone {
      position: relative;
      width: var(--phone-w);
      height: var(--phone-h);
      max-height: 100dvh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(244, 235, 222, 0.98), rgba(235, 224, 208, 0.98)),
        #eee0cb;
      border: 8px solid #101114;
      border-radius: 48px;
      box-shadow:
        0 24px 65px rgba(36, 42, 52, 0.26),
        0 2px 8px rgba(36, 42, 52, 0.12);
      touch-action: none;
      user-select: none;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 146px;
      height: 31px;
      transform: translateX(-50%);
      border-radius: 0 0 20px 20px;
      background: #101114;
      z-index: 4;
      pointer-events: none;
    }

    .phone::after {
      content: "";
      position: absolute;
      top: 9px;
      left: 50%;
      width: 46px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      z-index: 5;
      pointer-events: none;
    }

    canvas {
      position: relative;
      z-index: 2;
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    .intro-view {
      position: absolute;
      inset: 0;
      z-index: 7;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.66), transparent 34%),
        linear-gradient(180deg, rgba(244, 235, 222, 0.98), rgba(235, 224, 208, 0.98)),
        #eee0cb;
      touch-action: none;
    }

    .phone:not(.intro-mode) .intro-view {
      display: none;
    }

    .phone.intro-mode canvas,
    .phone.intro-mode .floor-shadow,
    .phone.intro-mode .drop-zone,
    .phone.intro-mode .done-button,
    .phone.intro-mode .topbar,
    .phone.intro-mode .back-button {
      display: none;
    }

    .intro-title {
      position: absolute;
      left: 50%;
      top: 45%;
      width: 290px;
      margin: 0;
      transform: translate(-50%, -50%) rotate(-3deg);
      color: #18191b;
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", Inter, sans-serif;
      font-size: 58px;
      font-weight: 950;
      line-height: 0.82;
      letter-spacing: 0;
      text-align: center;
      text-transform: lowercase;
      text-shadow:
        3px 3px 0 rgba(255, 255, 255, 0.74),
        -2px 5px 0 rgba(72, 111, 155, 0.14);
      z-index: 2;
    }

    .intro-object {
      position: absolute;
      width: 82px;
      height: 82px;
      object-fit: contain;
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg));
      animation: floatObject var(--dur, 6s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      filter: drop-shadow(0 10px 12px rgba(39, 43, 50, 0.12));
      opacity: 0.94;
    }

    @keyframes floatObject {
      0%, 100% {
        translate: 0 0;
      }
      50% {
        translate: var(--dx, 10px) var(--dy, -14px);
      }
    }

    .intro-pull {
      position: absolute;
      left: 50%;
      bottom: 30px;
      width: 96px;
      height: 70px;
      transform: translateX(-50%);
      border: 0;
      background: transparent;
      color: rgba(18, 19, 22, 0.72);
      display: grid;
      place-items: center;
      z-index: 3;
    }

    .intro-pull span {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(20, 22, 26, 0.14);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.66);
      box-shadow: 0 10px 24px rgba(42, 48, 58, 0.12);
      font-size: 34px;
      line-height: 1;
      animation: arrowPulse 1.5s ease-in-out infinite;
    }

    @keyframes arrowPulse {
      0%, 100% {
        transform: translateY(4px);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    .home-view {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: block;
      overflow-y: auto;
      padding: 42px 18px 34px;
      background:
        linear-gradient(180deg, rgba(244, 235, 222, 0.98), rgba(235, 224, 208, 0.98)),
        #eee0cb;
      touch-action: pan-y;
      scrollbar-width: none;
    }

    .home-view::-webkit-scrollbar {
      display: none;
    }

    .phone:not(.home-mode) .home-view {
      display: none;
    }

    .phone.home-mode canvas {
      visibility: hidden;
      pointer-events: none;
    }

    .phone.home-mode .floor-shadow,
    .phone.home-mode .drop-zone,
    .phone.home-mode .done-button,
    .phone.home-mode .topbar {
      display: none;
    }

    .home-nav {
      display: flex;
      align-items: start;
      justify-content: center;
      padding-top: 0;
    }

    .home-title {
      margin: 0;
      color: rgba(18, 19, 22, 0.84);
      font-size: 24px;
      font-weight: 820;
      letter-spacing: 0;
    }

    .home-id {
      min-width: 86px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(28, 31, 36, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      font-size: 11px;
      font-weight: 760;
      letter-spacing: 2px;
    }

    .tasks-button {
      width: 82px;
      height: 82px;
      border: 1px solid rgba(20, 22, 26, 0.16);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      color: rgba(18, 19, 22, 0.9);
      font-size: 17px;
      font-weight: 850;
      box-shadow: 0 10px 24px rgba(42, 48, 58, 0.12);
    }

    .hero-collage {
      position: relative;
      height: 272px;
      margin-top: 4px;
      overflow: hidden;
      border: 1px solid rgba(28, 31, 36, 0.12);
      border-radius: 28px;
      background:
        radial-gradient(circle at 32% 32%, rgba(255, 255, 255, 0.78), transparent 42%),
        rgba(255, 255, 255, 0.38);
    }

    .hero-collage img {
      position: absolute;
      width: 86px;
      height: 86px;
      object-fit: contain;
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg));
      filter: drop-shadow(0 8px 10px rgba(39, 43, 50, 0.13));
    }

    .hero-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .slot-area {
      margin-top: 22px;
      padding-bottom: 12px;
    }

    .slot-count {
      margin: 0 0 11px;
      color: rgba(24, 27, 32, 0.54);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0.7px;
      text-transform: uppercase;
    }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px 12px;
    }

    .object-slot {
      min-height: 112px;
      border: 1px solid rgba(28, 31, 36, 0.08);
      border-radius: 42px;
      background: rgba(255, 255, 255, 0.78);
      color: rgba(18, 19, 22, 0.88);
      display: grid;
      grid-template-rows: auto 1fr;
      place-items: center;
      padding: 10px 7px 9px;
      overflow: visible;
    }

    .object-slot img {
      max-width: 68px;
      max-height: 62px;
      object-fit: contain;
    }

    .slot-name {
      max-width: 100%;
      min-height: 28px;
      display: grid;
      place-items: center;
      overflow-wrap: anywhere;
      white-space: normal;
      line-height: 1.05;
      font-size: 12px;
      font-weight: 760;
      text-align: center;
    }

    .plus-slot {
      grid-template-rows: 1fr;
      font-size: 34px;
      font-weight: 260;
      color: rgba(18, 19, 22, 0.42);
    }

    .home-sheet .picture-box {
      width: 100%;
      height: 128px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      border: 1px dashed rgba(28, 31, 36, 0.22);
      border-radius: 8px;
      background: rgba(248, 248, 246, 0.78);
      color: rgba(24, 27, 32, 0.44);
      font-size: 13px;
      font-weight: 760;
    }

    .name-field {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(28, 31, 36, 0.14);
      border-radius: 8px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      font-weight: 650;
    }

    canvas:active {
      cursor: grabbing;
    }

    .topbar {
      position: absolute;
      top: calc(var(--drop-top) - 48px);
      left: 18px;
      right: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .back-button {
      position: absolute;
      top: 54px;
      left: 18px;
      z-index: 4;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(20, 22, 26, 0.14);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.78);
      color: rgba(18, 19, 22, 0.88);
      font-size: 28px;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(42, 48, 58, 0.1);
    }

    .phone.home-mode .back-button {
      display: none;
    }

    .brand {
      font-size: 24px;
      font-weight: 820;
      letter-spacing: 0;
      color: rgba(18, 19, 22, 0.82);
    }

    .counter {
      min-width: 54px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: rgba(18, 19, 22, 0.78);
      font-size: 12px;
      font-weight: 650;
      text-align: center;
      backdrop-filter: blur(16px);
    }

    .floor-shadow {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 21px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(30, 34, 39, 0.2), transparent 72%);
      pointer-events: none;
      filter: blur(7px);
    }

    .drop-zone {
      position: absolute;
      top: var(--drop-top);
      left: 50%;
      width: var(--drop-size);
      height: var(--drop-size);
      transform: translateX(-50%);
      border: 1.5px solid rgba(27, 31, 38, 0.16);
      border-radius: 8px;
      background: rgba(247, 249, 252, 0.48);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.86),
        0 14px 30px rgba(47, 54, 66, 0.08);
      pointer-events: none;
      z-index: 1;
    }

    .drop-zone::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px dashed rgba(27, 31, 38, 0.16);
      border-radius: 6px;
    }

    .done-button {
      position: absolute;
      top: calc(var(--drop-top) + var(--drop-size) - 48px);
      left: 50%;
      z-index: 4;
      width: 74px;
      height: 30px;
      transform: translateX(-50%);
      border: 1px solid rgba(24, 27, 32, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      color: rgba(18, 19, 22, 0.86);
      box-shadow: 0 8px 18px rgba(42, 48, 58, 0.12);
      font-size: 12px;
      font-weight: 750;
      pointer-events: auto;
    }

    .done-button:disabled {
      opacity: 0.45;
    }

    .modal-scrim {
      position: absolute;
      inset: 0;
      display: none;
      align-items: end;
      justify-content: center;
      padding: 18px;
      background: rgba(245, 247, 250, 0.38);
      backdrop-filter: blur(3px);
      z-index: 9;
    }

    .modal-scrim.open {
      display: flex;
    }

    .sheet {
      width: 100%;
      padding: 16px;
      border: 1px solid rgba(25, 29, 36, 0.12);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 20px 60px rgba(48, 55, 67, 0.2);
      backdrop-filter: blur(22px);
    }

    .sheet-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .swatch {
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      border: 1px solid rgba(25, 29, 36, 0.14);
      border-radius: 50%;
      box-shadow: inset 0 -9px 13px rgba(0, 0, 0, 0.18);
    }

    .task-title {
      min-width: 0;
      flex: 1;
    }

    .task-title h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 760;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .close {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(242, 244, 247, 0.86);
      color: var(--ink);
      font-size: 24px;
      line-height: 1;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 52px;
      gap: 12px;
      align-items: center;
    }

    input[type="range"] {
      display: none;
    }

    .dot-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 9px;
      align-items: center;
    }

    .progress-dot {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(28, 31, 36, 0.16);
      border-radius: 50%;
      background: rgba(242, 244, 247, 0.9);
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.72);
    }

    .progress-dot.active {
      border-color: var(--accent, #38a34a);
      background: var(--accent, #38a34a);
    }

    .progress-dot:focus-visible {
      outline: 2px solid var(--accent, #38a34a);
      outline-offset: 3px;
    }

    .progress-dot.empty {
      position: relative;
    }

    .progress-dot.empty::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: rgba(28, 31, 36, 0.28);
    }

    input[type="range"] {
      accent-color: var(--accent, #9cc9ff);
    }

    .value {
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: rgba(18, 19, 22, 0.82);
      background: rgba(242, 244, 247, 0.9);
      font-size: 13px;
      font-weight: 750;
    }
  </style>
</head>
<body>
  <main class="phone intro-mode" aria-label="Interactive task balls physics demo">
    <section class="intro-view" id="introView" aria-label="Entrance screen">
      <h1 class="intro-title">gravity<br>task</h1>
      <button class="intro-pull" id="introPull" type="button" aria-label="Open app">
        <span>↑</span>
      </button>
    </section>

    <section class="home-view" id="homeView" aria-label="Task object overview">
      <div class="home-nav">
        <h1 class="home-title">Gravity Task</h1>
      </div>
      <div class="hero-collage" id="heroCollage">
        <button class="tasks-button hero-center" id="tasksButton" type="button">tasks</button>
      </div>
      <div class="slot-area">
        <p class="slot-count">11 objects</p>
        <div class="slot-grid" id="slotGrid"></div>
      </div>
    </section>

    <canvas id="world" aria-label="Task balls physics canvas"></canvas>
    <button class="back-button" id="backButton" type="button" aria-label="Back">‹</button>
    <div class="floor-shadow"></div>
    <div class="drop-zone" id="dropZone" aria-hidden="true"></div>
    <button class="done-button" id="doneButton" type="button" disabled>Done</button>
    <div class="topbar">
      <div class="brand">Gravity Task</div>
      <div class="counter" id="counter" hidden>0%</div>
    </div>

    <section class="modal-scrim" id="modal" aria-hidden="true">
      <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="taskName">
        <div class="sheet-head">
          <div class="swatch" id="swatch"></div>
          <div class="task-title">
            <h1 id="taskName">Task</h1>
            <p>Progress changes the ball's saturation.</p>
          </div>
          <button class="close" id="close" type="button" aria-label="Close">×</button>
        </div>
        <div class="range-row">
          <input id="progress" type="range" min="0" max="100" value="0">
          <div class="dot-row" id="progressDots" aria-label="Progress dots">
            <button class="progress-dot" type="button" aria-label="20% progress" data-value="20"></button>
            <button class="progress-dot" type="button" aria-label="40% progress" data-value="40"></button>
            <button class="progress-dot" type="button" aria-label="60% progress" data-value="60"></button>
            <button class="progress-dot" type="button" aria-label="80% progress" data-value="80"></button>
            <button class="progress-dot" type="button" aria-label="100% progress" data-value="100"></button>
          </div>
          <div class="value" id="value">0%</div>
        </div>
      </div>
    </section>

    <section class="modal-scrim" id="homeModal" aria-hidden="true">
      <div class="sheet home-sheet" role="dialog" aria-modal="true" aria-labelledby="homeModalTitle">
        <div class="sheet-head">
          <div class="swatch" id="homeModalSwatch"></div>
          <div class="task-title">
            <h1 id="homeModalTitle">Task</h1>
            <p id="homeModalSub">Object subject</p>
          </div>
          <button class="close" id="homeModalClose" type="button" aria-label="Close">×</button>
        </div>
        <div class="picture-box" id="pictureBox">picture</div>
        <input class="name-field" id="nameField" type="text" placeholder="give it a name">
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("world");
    const ctx = canvas.getContext("2d");
    const phone = document.querySelector(".phone");
    const introView = document.getElementById("introView");
    const introPull = document.getElementById("introPull");
    const tasksButton = document.getElementById("tasksButton");
    const heroCollage = document.getElementById("heroCollage");
    const slotGrid = document.getElementById("slotGrid");
    const backButton = document.getElementById("backButton");
    const homeModal = document.getElementById("homeModal");
    const homeModalClose = document.getElementById("homeModalClose");
    const homeModalTitle = document.getElementById("homeModalTitle");
    const homeModalSub = document.getElementById("homeModalSub");
    const homeModalSwatch = document.getElementById("homeModalSwatch");
    const pictureBox = document.getElementById("pictureBox");
    const nameField = document.getElementById("nameField");
    const modal = document.getElementById("modal");
    const closeButton = document.getElementById("close");
    const progressInput = document.getElementById("progress");
    const progressDots = Array.from(document.querySelectorAll(".progress-dot"));
    const valueLabel = document.getElementById("value");
    const taskName = document.getElementById("taskName");
    const swatch = document.getElementById("swatch");
    const counter = document.getElementById("counter");
    const dropZone = document.getElementById("dropZone");
    const doneButton = document.getElementById("doneButton");

    const world = {
      width: 393,
      height: 852,
      gravity: 0.46,
      damping: 0.992,
      restitution: 0.36,
      friction: 0.985,
      bodies: [],
      active: null,
      selected: null,
      lastTime: performance.now()
    };

    const objects = [
      { h: 42, name: "bed", src: "assets/objects/bed.png", scale: 2.05 },
      { h: 190, name: "table", src: "assets/objects/desk.png", scale: 2.05 },
      { h: 352, name: "broom", src: "assets/objects/red-broom.png", scale: 2.05 },
      { h: 4, name: "makeup", src: "assets/objects/makeup-brush.png", scale: 2.05 },
      { h: 44, name: "Drawing", src: "assets/objects/pencil.png", scale: 2.05 },
      { h: 32, name: "illustration", src: "assets/objects/paint-brush.png", scale: 2.05 },
      { h: 210, name: "mop", src: "assets/objects/squeegee.png", scale: 2.05 },
      { h: 188, name: "dust", src: "assets/objects/spray.png", scale: 2.05 },
      { h: 202, name: "interactive", src: "assets/objects/macbook.png", scale: 2.05 },
      { h: 16, name: "phone", src: "assets/objects/iphone.png", scale: 2.05 },
      { h: 96, name: "chair", src: "assets/objects/chair.png", scale: 2.05 }
    ];

    const spriteImages = objects.map((item) => {
      const image = new Image();
      image.src = item.src;
      return image;
    });

    function showHome() {
      phone.classList.remove("intro-mode");
      phone.classList.add("home-mode");
      closeModal();
      closeHomeModal();
    }

    function populateIntro() {
      const placements = [
        [19, 20, -18, 8, -12], [49, 17, 11, -10, 10], [78, 22, 18, 12, -9],
        [18, 42, 16, 10, 13], [83, 43, -15, -12, -12], [24, 64, -24, 13, -10],
        [74, 66, 20, -10, 12], [50, 74, -6, 9, -13], [14, 80, 9, -8, 9],
        [87, 82, -12, 10, -8], [51, 26, 18, -9, 13]
      ];

      objects.forEach((item, index) => {
        const [left, top, rot, dx, dy] = placements[index];
        const img = document.createElement("img");
        img.className = "intro-object";
        img.src = item.src;
        img.alt = "";
        img.style.left = `${left}%`;
        img.style.top = `${top}%`;
        img.style.setProperty("--rot", `${rot}deg`);
        img.style.setProperty("--dx", `${dx}px`);
        img.style.setProperty("--dy", `${dy}px`);
        img.style.setProperty("--dur", `${5.4 + (index % 4) * 0.7}s`);
        img.style.setProperty("--delay", `${index * -0.33}s`);
        introView.appendChild(img);
      });
    }

    function populateHome() {
      const placements = [
        [24, 35, -18], [39, 26, 13], [55, 33, -8], [72, 28, 16],
        [30, 58, 19], [48, 57, -13], [63, 56, 8], [78, 59, -16],
        [40, 76, 12], [56, 74, -8], [69, 75, 18]
      ];

      objects.forEach((item, index) => {
        const [left, top, rot] = placements[index];
        const img = document.createElement("img");
        img.src = item.src;
        img.alt = item.name;
        img.style.left = `${left}%`;
        img.style.top = `${top}%`;
        img.style.setProperty("--rot", `${rot}deg`);
        heroCollage.appendChild(img);
      });

      [...objects, null].forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = item ? "object-slot" : "object-slot plus-slot";
        if (item) {
          button.innerHTML = `<span class="slot-name">${item.name}</span><img src="${item.src}" alt="">`;
          button.addEventListener("click", () => openHomeModal(item));
        } else {
          button.textContent = "+";
          button.addEventListener("click", () => openHomeModal(null));
        }
        slotGrid.appendChild(button);
      });
    }

    function openHomeModal(item) {
      homeModal.classList.add("open");
      homeModal.setAttribute("aria-hidden", "false");
      if (item) {
        homeModalTitle.textContent = item.name;
        homeModalSub.textContent = "Object subject";
        homeModalSwatch.style.background = `hsl(${item.h}, 58%, 68%)`;
        pictureBox.innerHTML = `<img src="${item.src}" alt="" style="max-width:100%;max-height:110px;object-fit:contain;">`;
        nameField.value = item.name;
      } else {
        homeModalTitle.textContent = "New object";
        homeModalSub.textContent = "Add a picture and name";
        homeModalSwatch.style.background = "rgba(242, 244, 247, 0.95)";
        pictureBox.textContent = "put a picture";
        nameField.value = "";
      }
    }

    function closeHomeModal() {
      homeModal.classList.remove("open");
      homeModal.setAttribute("aria-hidden", "true");
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
      world.width = rect.width;
      world.height = rect.height;
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function colorFor(ball, alpha = 1) {
      const saturation = 4 + ball.progress * 0.72;
      const lightness = 54 + ball.progress * 0.1;
      return `hsla(${ball.hue}, ${saturation}%, ${lightness}%, ${alpha})`;
    }

    function progressColor(progress) {
      const hue = progress * 1.2;
      return `hsl(${hue}, 76%, 48%)`;
    }

    function makeBall(index, x, y, r, progress) {
      const item = objects[index % objects.length];
      return {
        id: index,
        x,
        y,
        prevX: x,
        prevY: y,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -Math.random() * 2,
        r,
        mass: r * r,
        hue: item.h,
        name: item.name,
        sprite: spriteImages[index % spriteImages.length],
        spriteScale: item.scale,
        progress,
        stuck: false,
        sleeping: false
      };
    }

    function visibleRadius(ball) {
      return ball.r * ball.spriteScale;
    }

    function seedBalls() {
      world.bodies = [];
      const count = objects.length;
      const r = 35;
      const columns = 4;
      const spacing = 72;
      const startX = (world.width - spacing * (columns - 1)) / 2;
      for (let i = 0; i < count; i++) {
        const row = Math.floor(i / columns);
        const rowOffset = row % 2 === 1 ? spacing * 0.35 : 0;
        const x = startX + rowOffset + (i % columns) * spacing;
        const y = world.height - 84 - row * 72;
        world.bodies.push(makeBall(i, x, y, r, 0));
      }
    }

    function pointerPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const point = event.touches ? event.touches[0] : event;
      return {
        x: point.clientX - rect.left,
        y: point.clientY - rect.top
      };
    }

    function hitTest(x, y) {
      for (let i = world.bodies.length - 1; i >= 0; i--) {
        const b = world.bodies[i];
        const dx = x - b.x;
        const dy = y - b.y;
        const hitRadius = Math.max(b.r, visibleRadius(b) * 0.72);
        if (dx * dx + dy * dy <= hitRadius * hitRadius) return b;
      }
      return null;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function dropRect() {
      const zone = dropZone.getBoundingClientRect();
      const stage = canvas.getBoundingClientRect();
      return {
        x: zone.left - stage.left,
        y: zone.top - stage.top,
        width: zone.width,
        height: zone.height
      };
    }

    function isInsideDropZone(ball) {
      const rect = dropRect();
      return (
        ball.x > rect.x + ball.r * 0.35 &&
        ball.x < rect.x + rect.width - ball.r * 0.35 &&
        ball.y > rect.y + ball.r * 0.35 &&
        ball.y < rect.y + rect.height - ball.r * 0.35
      );
    }

    function pointInsideDropZone(point) {
      const rect = dropRect();
      return (
        point.x >= rect.x &&
        point.x <= rect.x + rect.width &&
        point.y >= rect.y &&
        point.y <= rect.y + rect.height
      );
    }

    function stuckBalls() {
      return world.bodies.filter((ball) => ball.stuck);
    }

    function arrangeStuckBalls() {
      const balls = stuckBalls();
      const rect = dropRect();

      balls.forEach((ball) => {
        ball.x = rect.x + rect.width / 2;
        ball.y = rect.y + rect.height * 0.38;
        ball.vx = 0;
        ball.vy = 0;
      });
      phone.dataset.stuck = String(balls.length);
      doneButton.disabled = !balls.some((ball) => ball.progress === 100);
    }

    function removeCompletedStuckBall() {
      const index = world.bodies.findIndex((ball) => ball.stuck && ball.progress === 100);
      if (index === -1) return;
      const [removed] = world.bodies.splice(index, 1);
      if (world.selected === removed) closeModal();
      arrangeStuckBalls();
      counter.textContent = `${Math.round(averageProgress())}%`;
    }

    function openModal(ball) {
      world.selected = ball;
      taskName.textContent = ball.name;
      progressInput.value = String(ball.progress);
      updateModalColor();
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      world.selected = null;
    }

    function updateModalColor() {
      const ball = world.selected;
      if (!ball) return;
      valueLabel.textContent = `${ball.progress}%`;
      const color = progressColor(ball.progress);
      swatch.style.background = color;
      progressInput.style.setProperty("--accent", color);
      progressDots.forEach((dot) => {
        const value = Number(dot.dataset.value);
        const active = value <= ball.progress;
        dot.classList.toggle("active", active);
        dot.classList.toggle("empty", ball.progress === 0);
        dot.style.setProperty("--accent", color);
        dot.setAttribute("aria-pressed", String(active));
      });
      valueLabel.style.borderColor = color;
      counter.textContent = `${Math.round(averageProgress())}%`;
    }

    function averageProgress() {
      return world.bodies.reduce((sum, b) => sum + b.progress, 0) / world.bodies.length;
    }

    function solveBounds(b) {
      const edge = Math.max(b.r, visibleRadius(b));
      if (b.x - edge < 0) {
        b.x = edge;
        b.vx = Math.abs(b.vx) * world.restitution;
      }
      if (b.x + edge > world.width) {
        b.x = world.width - edge;
        b.vx = -Math.abs(b.vx) * world.restitution;
      }
      if (b.y - edge < 0) {
        b.y = edge;
        b.vy = Math.abs(b.vy) * world.restitution;
      }
      if (b.y + edge > world.height - 14) {
        b.y = world.height - 14 - edge;
        b.vy = -Math.abs(b.vy) * world.restitution;
        b.vx *= world.friction;
      }
    }

    function solveCollision(a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const minDist = a.r + b.r;
      const distSq = dx * dx + dy * dy;
      if (distSq <= 0 || distSq >= minDist * minDist) return;

      const dist = Math.sqrt(distSq);
      const nx = dx / dist;
      const ny = dy / dist;
      const overlap = minDist - dist;
      const aInvMass = a.stuck ? 0 : 1 / a.mass;
      const bInvMass = b.stuck ? 0 : 1 / b.mass;
      const invMassSum = aInvMass + bInvMass;
      if (invMassSum === 0) return;
      const aShare = aInvMass / invMassSum;
      const bShare = bInvMass / invMassSum;

      a.x -= nx * overlap * aShare;
      a.y -= ny * overlap * aShare;
      b.x += nx * overlap * bShare;
      b.y += ny * overlap * bShare;

      const rvx = b.vx - a.vx;
      const rvy = b.vy - a.vy;
      const velAlongNormal = rvx * nx + rvy * ny;
      if (velAlongNormal > 0) return;

      const impulse = -(1 + world.restitution) * velAlongNormal / invMassSum;
      a.vx -= impulse * nx * aInvMass;
      a.vy -= impulse * ny * aInvMass;
      b.vx += impulse * nx * bInvMass;
      b.vy += impulse * ny * bInvMass;
    }

    function step() {
      for (const b of world.bodies) {
        if (world.active && world.active.ball === b) {
          const target = world.active.pointer;
          const lift = clamp(target.y, 36 + b.r, world.height - b.r);
          const nextX = clamp(target.x, b.r, world.width - b.r);
          const nextY = lift;
          b.vx = (nextX - b.x) * 0.65;
          b.vy = (nextY - b.y) * 0.65;
          b.x = nextX;
          b.y = nextY;
          solveBounds(b);
          continue;
        }

        if (b.stuck) {
          b.vx = 0;
          b.vy = 0;
          continue;
        }

        b.vy += world.gravity;
        b.vx *= world.damping;
        b.vy *= world.damping;
        b.x += b.vx;
        b.y += b.vy;
        solveBounds(b);
      }

      for (let iter = 0; iter < 4; iter++) {
        for (let i = 0; i < world.bodies.length; i++) {
          for (let j = i + 1; j < world.bodies.length; j++) {
            solveCollision(world.bodies[i], world.bodies[j]);
          }
        }
        for (const b of world.bodies) {
          if (!b.stuck) solveBounds(b);
        }
      }
      arrangeStuckBalls();
    }

    function drawObject(b) {
      ctx.save();
      const image = b.sprite;
      if (image.complete && image.naturalWidth > 0) {
        const maxSide = b.r * 2 * b.spriteScale;
        const ratio = Math.min(maxSide / image.naturalWidth, maxSide / image.naturalHeight);
        const width = image.naturalWidth * ratio;
        const height = image.naturalHeight * ratio;
        ctx.drawImage(image, b.x - width / 2, b.y - height / 2, width, height);
      } else {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 0.55, 0, Math.PI * 2);
        ctx.fillStyle = colorFor(b, 0.22);
        ctx.fill();
      }

      ctx.fillStyle = progressColor(b.progress);
      ctx.font = "750 11px Inter, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(`${b.progress}`, b.x, b.y + b.r * 0.68);

      const labelY = b.y + b.r * 1.04;
      ctx.font = "800 10px Inter, sans-serif";
      const labelWidth = ctx.measureText(b.name).width + 12;
      ctx.fillStyle = "rgba(255, 255, 255, 0.72)";
      ctx.beginPath();
      ctx.roundRect(b.x - labelWidth / 2, labelY - 8, labelWidth, 16, 8);
      ctx.fill();
      ctx.fillStyle = "rgba(25, 28, 32, 0.84)";
      ctx.fillText(b.name, b.x, labelY);
      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, world.width, world.height);
      for (const b of world.bodies) drawObject(b);
    }

    function loop(time) {
      const elapsed = Math.min(32, time - world.lastTime);
      const ticks = Math.max(1, Math.round(elapsed / 16.67));
      world.lastTime = time;
      for (let i = 0; i < ticks; i++) step();
      render();
      requestAnimationFrame(loop);
    }

    function beginDrag(event) {
      if (modal.classList.contains("open")) return;
      const p = pointerPoint(event);
      const ball = hitTest(p.x, p.y);
      if (!ball) return;
      event.preventDefault();
      const index = world.bodies.indexOf(ball);
      world.bodies.splice(index, 1);
      world.bodies.push(ball);
      ball.stuck = false;
      world.active = {
        ball,
        pointer: p,
        start: p,
        moved: false,
        startedAt: performance.now()
      };
      ball.vy -= 7;
      canvas.setPointerCapture?.(event.pointerId);
    }

    function moveDrag(event) {
      if (!world.active) return;
      event.preventDefault();
      const p = pointerPoint(event);
      const dx = p.x - world.active.start.x;
      const dy = p.y - world.active.start.y;
      if (dx * dx + dy * dy > 64) world.active.moved = true;
      world.active.pointer = p;
    }

    function endDrag(event) {
      if (!world.active) return;
      event.preventDefault();
      const active = world.active;
      world.active = null;
      if (
        active.moved &&
        active.ball.progress === 100 &&
        (isInsideDropZone(active.ball) || pointInsideDropZone(active.pointer))
      ) {
        active.ball.stuck = true;
        arrangeStuckBalls();
        return;
      }
      if (!active.moved && performance.now() - active.startedAt < 280) {
        openModal(active.ball);
      }
    }

    progressInput.addEventListener("input", () => {
      if (!world.selected) return;
      world.selected.progress = Number(progressInput.value);
      updateModalColor();
    });

    progressDots.forEach((dot) => {
      dot.addEventListener("click", () => {
        if (!world.selected) return;
        const value = Number(dot.dataset.value);
        const nextValue = world.selected.progress === value && value === 20 ? 0 : value;
        world.selected.progress = nextValue;
        progressInput.value = String(nextValue);
        updateModalColor();
      });
    });

    closeButton.addEventListener("click", closeModal);
    doneButton.addEventListener("click", removeCompletedStuckBall);
    introPull.addEventListener("click", showHome);
    let introStartY = null;
    introView.addEventListener("pointerdown", (event) => {
      introStartY = event.clientY;
    });
    introView.addEventListener("pointerup", (event) => {
      if (introStartY !== null && introStartY - event.clientY > 70) showHome();
      introStartY = null;
    });
    tasksButton.addEventListener("click", () => {
      phone.classList.remove("home-mode");
      phone.classList.remove("intro-mode");
      resize();
      arrangeStuckBalls();
    });
    backButton.addEventListener("click", () => {
      closeModal();
      phone.classList.remove("intro-mode");
      phone.classList.add("home-mode");
    });
    homeModalClose.addEventListener("click", closeHomeModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
    homeModal.addEventListener("click", (event) => {
      if (event.target === homeModal) closeHomeModal();
    });

    canvas.addEventListener("pointerdown", beginDrag);
    canvas.addEventListener("pointermove", moveDrag);
    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);
    window.addEventListener("resize", () => {
      resize();
      for (const b of world.bodies) {
        const edge = Math.max(b.r, visibleRadius(b));
        b.x = clamp(b.x, edge, world.width - edge);
        b.y = clamp(b.y, edge, world.height - edge - 14);
      }
      arrangeStuckBalls();
    });

    populateIntro();
    populateHome();
    resize();
    seedBalls();
    updateModalColor();
    arrangeStuckBalls();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
